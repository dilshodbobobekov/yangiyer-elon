<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, white, gray);
            background-size: 100% 100%;
            min-height: 120vh;
            margin: 0;
            padding: 20px 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
            width: 600px;
            /* height olib tashlandi, kontent o'ziga qarab cho'ziladi */
            padding: 20px;
        }

        .card:hover {
            transform: translateY(-7px);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- KATEGORIYALAR UCHUN STYLING --- */
        .kategoriya-konteyner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 5px;
        }

        .kategoriya {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s ease;
            user-select: none;
        }

        .kategoriya:hover {
            border-color: #0f699d;
            background-color: #f0f7fa;
        }

        /* Aktiv (tanlangan) kategoriya stili */
        .kategoriya.active {
            border-color: #0f9d58;
            background-color: #e8f5e9;
            font-weight: bold;
            transform: scale(1.02);
        }

        .card-content input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .card-content input:focus {
            border-color: #0f9d58;
        }

        .card-content input:hover {
            transform: translateY(-2px);
            transform: scale(1.01);
        }

        .btnsave {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: #0f699d;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btnsave:hover {
            background: #0c5580;
            transform: scale(1.02);
        }

        .card-content textarea {
            width: 100%;
            height: 200px; /* Balandligi biroz ixchamlashtirildi */
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
            resize: vertical;
        }

        .card-content textarea:focus {
            border-color: #0f9d58;
        }

        .card-content textarea:hover {
            transform: translateY(-2px);
            transform: scale(1.01);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-content">
            <!-- Kategoriya bo'limi shu yerga chiroyli tartibda qo'shildi -->
            <label style="font-weight: bold; font-size: 16px; color: #333;">Bo'limni tanlang:</label>
            <div class="kategoriya-konteyner">
                <div class="kategoriya" data-val="Avtomobillar">🚗 Avtomobillar</div>
                <div class="kategoriya" data-val="Uy-joy">🏡 Uy-joy</div>
                <div class="kategoriya" data-val="Telefon">📱 Telefon</div>
                <div class="kategoriya" data-val="Ish">👨‍⚕️ Ish</div>
                <div class="kategoriya" data-val="Xizmatlar">👷‍♂️ Xizmatlar</div>
                <div class="kategoriya" data-val="Ta'lim">🎓 Ta'lim</div>
                <div class="kategoriya" data-val="Kiyim kechak">👕👖 Kiyim kechak</div>
            </div>

            <input type="text" id="name" placeholder="Nomi">
            <input type="text" id="price" placeholder="Narxi">
            <input type="text" id="img" placeholder="Rasm URL">

            <textarea placeholder="Ma'lumot" id="about"></textarea>

            <button class="btnsave">Qo'shish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAVpu359-UXW_iEGPMZxeMmYQUYCW0hCWg",
            authDomain: "yangiyer-elon.firebaseapp.com",
            projectId: "yangiyer-elon",
            storageBucket: "yangiyer-elon.firebasestorage.app",
            messagingSenderId: "578781932389",
            appId: "1:578781932389:web:3f982cbf869cc066768f8c"
        };

        const app = initializeApp(firebaseConfig);

        import {
            getDatabase,
            ref,
            set,
            get
        } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js';

        const db = getDatabase();

        let name = document.getElementById('name');
        let price = document.getElementById('price');
        let img = document.getElementById('img');
        let about = document.getElementById('about');
        let btnsave = document.querySelector('.btnsave');
        
        // Tanlangan kategoriyani eslab qolish uchun o'zgaruvchi
        let tanlanganKategoriya = ""; 

        // --- KATEGORIYALARGA KLIK HODISASINI QO'SHISH ---
        const kategoriyalar = document.querySelectorAll('.kategoriya');
        kategoriyalar.forEach(kat => {
            kat.addEventListener('click', function() {
                // Avval barcha aktiv klasslarni olib tashlaymiz
                kategoriyalar.forEach(k => k.classList.remove('active'));
                // Bosilganiga aktiv klass qo'shamiz
                this.classList.add('active');
                // Qiymatini o'zgaruvchiga saqlaymiz
                tanlanganKategoriya = this.getAttribute('data-val');
            });
        });

        function InsertData() {
            // 1. Yangi qo'shilgan tekshiruv: Bo'sh joylar yoki kategoriya tanlanmaganini aniqlash
            if (!tanlanganKategoriya) {
                alert("Iltimos, avval bo'limlardan birini tanlang!");
                return; // Funksiyani shu joyda to'xtatadi
            }
            if (name.value.trim() === "" || price.value.trim() === "" || img.value.trim() === "" || about.value.trim() === "") {
                alert("Bo'sh joy mavjud! Iltimos, barcha maydonlarni to'ldiring.");
                return; // Funksiyani shu joyda to'xtatadi
            }

            const dbRef = ref(db, 'Maxsulotlar');

            // Oldingi massiv ko'rinishida saqlash mantiqi (O'zgartirilmadi)
            get(dbRef).then((snapshot) => {
                let nextIndex = 0;

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    nextIndex = Array.isArray(data) ? data.length : Object.keys(data).length;
                }

                // Kategoriya ma'lumoti massiv ichiga muvaffaqiyatli qo'shildi
                set(ref(db, 'Maxsulotlar/' + nextIndex), {
                    id: nextIndex,
                    kategoriya: tanlanganKategoriya, // <--- Tanlangan kategoriya bazaga ketadi
                    name: name.value,
                    price: price.value,
                    img: img.value,
                    about: about.value
                })
                .then(() => {
                    alert("Ma'lumot muvaffaqiyatli qo'shildi!");
                    
                    // Inputlarni va tanlangan kategoriyani tozalash
                    name.value = ''; price.value = ''; img.value = ''; about.value = '';
                    kategoriyalar.forEach(k => k.classList.remove('active'));
                    tanlanganKategoriya = "";
                })
                .catch((error) => {
                    alert('Xatolik: ' + error);
                });

            }).catch((error) => {
                alert("Bazadan ma'lumot olishda xatolik: " + error);
            });
        }

        btnsave.addEventListener('click', InsertData);
    </script>
</body>

</html>
