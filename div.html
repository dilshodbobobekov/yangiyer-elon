<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahsulotlar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --forest: #163f2c;
            --forest-deep: #0e2b1d;
            --leaf: #2f7a52;
            --mint: #8fd9ab;
            --mint-pale: #eaf7ee;
            --cream: #f7f7f2;
            --gold: #e0a63b;
            --ink: #16241c;
            --muted: #5b6b60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: var(--cream);
            color: var(--ink);
            padding: 48px 32px 80px;
        }

        /* Header / hero */
        .hero {
            max-width: 1200px;
            margin: 0 auto 44px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--forest);
            padding-bottom: 24px;
        }

        .hero-eyebrow {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--leaf);
            margin-bottom: 10px;
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: clamp(34px, 5vw, 54px);
            color: var(--forest-deep);
            line-height: 1.05;
        }

        .hero p {
            color: var(--muted);
            font-size: 15px;
            max-width: 320px;
        }

        /* Grid */
        #products {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #e3e8e2;
            box-shadow: 0 1px 2px rgba(14, 43, 29, .04);
            transition: transform .35s cubic-bezier(.2, .8, .2, 1), box-shadow .35s ease, border-color .35s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(14, 43, 29, .16);
            border-color: var(--mint);
        }

        .card .img-wrap {
            position: relative;
            width: 100%;
            height: 230px;
            background: var(--mint-pale);
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .5s ease;
        }

        .card:hover img {
            transform: scale(1.06);
        }

        .info {
            padding: 20px 20px 22px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            background: var(--mint-pale);
            color: var(--leaf);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .02em;
            margin-bottom: 14px;
        }

        .category::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--leaf);
            display: inline-block;
        }

        .name {
            font-family: 'Fraunces', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--forest-deep);
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .price {
            color: var(--forest);
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            font-family: 'Fraunces', serif;
        }

        .price::after {
            content: " so'm";
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
        }

        .about {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
            height: 66px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .btn {
            width: 100%;
            margin-top: auto;
            border: none;
            background: var(--forest);
            color: #fff;
            padding: 0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .25s ease;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--leaf);
        }

        .a {
            display: block;
            text-decoration: none;
            color: #fff;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
        }

        #products h1 {
            grid-column: 1 / -1;
            text-align: center;
            font-family: 'Fraunces', serif;
            color: var(--muted);
            padding: 60px 0;
        }

        @media (max-width: 480px) {
            body {
                padding: 32px 16px 60px;
            }

            .hero {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

</head>

<body>

    <!-- <div class="hero">
        <div>
            <span class="hero-eyebrow">Katalog</span>
            <h1>Mahsulotlar</h1>
        </div>
        <p>Sifatli mahsulotlar — bir joyda to'plangan, tanlash oson.</p>
    </div> -->

    <div id="products"></div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVpu359-UXW_iEGPMZxeMmYQUYCW0hCWg",
            authDomain: "yangiyer-elon.firebaseapp.com",
            projectId: "yangiyer-elon",
            storageBucket: "yangiyer-elon.firebasestorage.app",
            messagingSenderId: "578781932389",
            appId: "1:578781932389:web:3f982cbf869cc066768f8c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const products = document.getElementById("products");

        function loadProducts() {

            get(ref(db, "Maxsulotlar")).then((snapshot) => {

                products.innerHTML = "";

                if (snapshot.exists()) {

                    const data = snapshot.val();

                    Object.values(data).forEach(item => {

                        products.innerHTML += `
<div class="card">

    <div class="img-wrap">
        <img src="${item.img}" alt="">
    </div>

    <div class="info">

        <div class="category">${item.kategoriya}</div>

        <div class="name">${item.name}</div>

        <div class="price">${item.price}</div>

        <div class="about">${item.about}</div>

        <button class="btn"><a class="a" href="about.html">Biz haqimizda</a></button>

    </div>

</div>
`;

                    });

                } else {

                    products.innerHTML = "<h1>Mahsulot yo'q</h1>";

                }

            }).catch((error) => {

                console.log(error);

            });

        }

        loadProducts();
    </script>

</body>

</html>
